<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="/analytics.js"></script>
    
    <title>ABOUT | BLOOD ESPORTS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #FFD700;
            --red: #FF0000;
            --black: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-glow: 0 0 25px rgba(255, 215, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 10px var(--gold); }
            50% { text-shadow: 0 0 30px var(--gold), 0 0 10px white; }
            100% { text-shadow: 0 0 10px var(--gold); }
        }

        .animate-up { opacity: 0; animation: fadeInUp 1s ease-out forwards; }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        .luxury-nav { background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--gold); padding: 1rem 2rem; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .nav-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; transition: 0.3s; }
        .nav-brand:hover { transform: scale(1.05); }
        
        .nav-logo-small { height: 40px; width: auto; }
        .nav-title { font-family: 'Orbitron'; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; color: white; }

        .desktop-links { display: flex; gap: 20px; }
        .desktop-links a { color: white; text-decoration: none; font-weight: 700; font-family: 'Orbitron'; font-size: 0.8rem; transition: 0.3s; }
        .desktop-links a:hover { color: var(--gold); text-shadow: var(--neon-glow); }

        .mobile-dock {
            display: none;
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--gold);
            border-radius: 50px;
            padding: 12px 25px;
            z-index: 2000;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), var(--neon-glow);
        }
        .dock-item { color: white; text-decoration: none; text-align: center; font-family: 'Orbitron'; font-size: 0.65rem; font-weight: 700; transition: 0.3s; }
        .dock-item i { display: block; font-size: 1.2rem; color: var(--gold); margin-bottom: 4px; }

        .about-section { padding: 6rem 1.5rem; max-width: 1100px; margin: 0 auto; text-align: center; }
        .about-title { 
            font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900; 
            color: var(--gold); text-shadow: var(--neon-glow); margin-bottom: 30px;
            animation: pulseGlow 3s infinite;
        }
        .deep-writeup { color: #ccc; font-size: 1.1rem; line-height: 1.8; margin-bottom: 4rem; text-align: justify; }

        .trophy-section { margin-bottom: 5rem; }
        .trophy-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 2rem; }
        .trophy-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.8), rgba(0,0,0,0.9));
            border: 1px solid var(--gold); padding: 2rem; border-radius: 15px;
            transition: 0.3s; position: relative; overflow: hidden;
        }
        .trophy-card:hover { transform: translateY(-10px); box-shadow: 0 0 40px rgba(255, 215, 0, 0.2); }
        .trophy-icon { font-size: 3.5rem; color: var(--gold); margin-bottom: 15px; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 10px var(--gold)); }

        .team-deep-dive { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 5rem; }
        .team-info-card { background: var(--glass); border: 1px solid #333; padding: 2.5rem; border-radius: 20px; text-align: left; transition: 0.4s; backdrop-filter: blur(10px); }
        .team-info-card:hover { border-color: var(--gold); box-shadow: var(--neon-glow); transform: scale(1.02); }
        .team-info-card h3 { font-family: 'Orbitron'; color: var(--gold); margin-bottom: 10px; }
        .team-info-card span { color: var(--red); font-family: 'Orbitron'; font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; display: block; margin-bottom: 15px; }

        .leader-flex { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; margin-top: 3rem; }
        .leader-card { width: 350px; background: rgba(15,15,15,0.9); border-left: 4px solid var(--gold); padding: 2.5rem; border-radius: 0 15px 15px 0; text-align: left; transition: 0.3s; }
        .leader-card:hover { background: rgba(25,25,25,1); box-shadow: -10px 0 20px rgba(255, 215, 0, 0.1); }
        .leader-name { font-family: 'Orbitron'; font-size: 2rem; color: white; margin: 10px 0; }

        /* SPECIAL FOUNDER */
        .founder-special {
            border-left: 6px solid var(--gold);
            background: linear-gradient(145deg, rgba(35,25,0,0.95), rgba(10,10,10,0.95));
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
        }
        .founder-special .leader-name {
            color: var(--gold);
            text-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
        }

        .footer { text-align: center; padding: 4rem 1.5rem; border-top: 1px solid #222; background: #000000; margin-top: 4rem; }
        .footer-text { font-family: 'Orbitron'; font-size: 0.75rem; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; }
        .legal-links a { color: #888; text-decoration: none; font-size: 0.7rem; font-family: 'Orbitron'; margin: 0 10px; transition: 0.3s; }
        .legal-links a:hover { color: var(--gold); }

        @media (max-width: 850px) { .desktop-links { display: none; } .mobile-dock { display: flex; } }
    </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<section class="about-section">

<h2 style="font-family:'Orbitron'; color: var(--gold); margin-bottom: 2rem;">COMMANDERS</h2>

<div class="leader-flex">

<div class="leader-card founder-special">
    <div style="font-family:'Orbitron'; color:var(--gold); font-size:0.7rem;">FOUNDER</div>
    <div class="leader-name">CHOCO</div>
    <p style="color:#ddd;">The architect of our competitive philosophy and the heart & soul of the Blood family.</p>
</div>

<div class="leader-card">
    <div style="font-family:'Orbitron'; color:var(--gold); font-size:0.7rem;">MANAGER</div>
    <div class="leader-name">DARKWITCH</div>
    <p style="color:#888;">The heartbeat of the clan.</p>
</div>

<div class="leader-card">
    <div style="font-family:'Orbitron'; color:var(--gold); font-size:0.7rem;">ASSISTANT MANAGER</div>
    <div class="leader-name">FIBER</div>
    <p style="color:#888;">Committed to building a stronger roster.</p>
</div>

<div class="leader-card">
    <div style="font-family:'Orbitron'; color:var(--gold); font-size:0.7rem;">INTERIM MANAGER</div>
    <div class="leader-name">IFIRST</div>
    <p style="color:#888;">Stepping in to guide and strengthen the clan.</p>
</div>

</div>

</section>

</body>
</html>
