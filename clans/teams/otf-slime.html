<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="/analytics.js"></script>
    
    <title>OTF Slime - Blood Esports | T零丨 Division</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood: #ff0000;
            --blood-dark: #8a0303;
            --thunder: #050505;
            --glass: rgba(20, 0, 0, 0.7);
            --gold: #FFD700;
            --slime: #39ff14;
            --slime-dark: #103b08;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--thunder);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(57, 255, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        .nav-bar {
            background: rgba(5, 10, 5, 0.95);
            border-bottom: 2px solid var(--slime);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.08);
        }

        .nav-logo { 
            font-family: 'Orbitron';
            font-weight: 900;
            color: white;
            text-decoration: none;
            font-size: 1.2rem; 
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .nav-logo span { color: var(--slime); }
        .nav-logo:hover { text-shadow: 0 0 10px var(--slime); }

        .back-btn {
            font-family: 'Orbitron';
            font-size: 0.8rem;
            color: white;
            text-decoration: none;
            border: 1px solid var(--slime);
            padding: 8px 20px;
            border-radius: 20px;
            transition: 0.3s;
            background: rgba(57, 255, 20, 0.08);
        }

        .back-btn:hover {
            background: var(--slime);
            color: black;
            box-shadow: 0 0 20px var(--slime);
        }

        .hero {
            text-align: center;
            padding: 6rem 1rem 4rem;
            position: relative;
            animation: slideUp 1s ease-out;
        }
        
        .hero-logo {
            font-size: 5rem;
            color: var(--slime);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 30px var(--slime));
            animation: pulseGlow 3s infinite;
        }

        .hero h1 { 
            font-family: 'Orbitron';
            font-size: clamp(3rem, 10vw, 5.5rem); 
            background: linear-gradient(to bottom, #ffffff, var(--slime)); 
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(57, 255, 20, 0.35);
        }

        .hero p { 
            font-family: 'Orbitron';
            color: #ccc;
            letter-spacing: 3px;
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .roster-title {
            text-align: center;
            font-family: 'Orbitron';
            color: var(--slime);
            margin-bottom: 3rem;
            font-size: 2rem;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--slime);
            border-bottom: 1px solid var(--slime);
            display: inline-block;
            padding-bottom: 10px;
        }

        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding-bottom: 4rem;
        }

        .player-card {
            background: linear-gradient(145deg, rgba(8, 20, 8, 0.85), rgba(3, 8, 3, 0.95));
            border: 1px solid rgba(57, 255, 20, 0.25);
            border-radius: 15px;
            padding: 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            animation: slideUp 0.8s ease-out backwards;
            backdrop-filter: blur(5px);
        }

        .player-card:nth-child(1) { animation-delay: 0.1s; }
        .player-card:nth-child(2) { animation-delay: 0.2s; }
        .player-card:nth-child(3) { animation-delay: 0.3s; }
        .player-card:nth-child(4) { animation-delay: 0.4s; }
        .player-card:nth-child(5) { animation-delay: 0.5s; }
        .player-card:nth-child(6) { animation-delay: 0.6s; }
        .player-card:nth-child(7) { animation-delay: 0.7s; }

        .player-card:hover {
            transform: translateY(-10px);
            border-color: var(--slime);
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.18);
            background: rgba(57, 255, 20, 0.05);
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--slime);
            transform: scaleX(0);
            transition: 0.4s;
            transform-origin: left;
        }

        .player-card:hover::before { transform: scaleX(1); }

        .player-icon {
            font-size: 3rem;
            color: var(--slime);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px var(--slime));
        }

        .player-name {
            font-family: 'Orbitron';
            font-size: 1.6rem;
            font-weight: 900;
            color: white;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .player-tag {
            color: #9adf9a;
            font-size: 0.8rem;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        footer { 
            text-align: center;
            padding: 4rem 1rem;
            color: #444;
            font-family: 'Orbitron'; 
            font-size: 0.8rem;
            margin-top: 2rem;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

    <canvas id="slime-canvas"></canvas>

    <nav class="nav-bar">
        <a href="#" class="nav-logo"><i class="fas fa-skull-crossbones"></i> <span>T零丨</span> SLIME</a>
        <a href="../otf.html" class="back-btn"><i class="fas fa-arrow-left"></i> BACK TO OTF</a>
    </nav>

    <div class="container">
        <header class="hero">
            <div class="hero-logo"><i class="fas fa-radiation"></i></div>
            <h1><span style="color:var(--slime);">T零丨</span> OTF SLIME</h1>
            <p>SLIME DIVISION</p>
        </header>

        <div style="text-align: center;">
            <div class="roster-title">ACTIVE ROSTER</div>
        </div>

        <div class="roster-grid">
            
            <div class="player-card">
                <div class="player-icon"><i class="fas fa-crown"></i></div>
                <div class="player-name">WISH</div>
                <div class="player-tag">T零丨Wish</div>
            </div>

            <div class="player-card">
                <div class="player-icon"><i class="fas fa-mask"></i></div>
                <div class="player-name">JOKER</div>
                <div class="player-tag">T零丨Joker</div>
            </div>

            <div class="player-card">
                <div class="player-icon"><i class="fas fa-gem"></i></div>
                <div class="player-name">GIFTED</div>
                <div class="player-tag">T零丨Gifted</div>
            </div>

            <div class="player-card">
                <div class="player-icon"><i class="fas fa-bolt"></i></div>
                <div class="player-name">SAMCHES</div>
                <div class="player-tag">T零丨Samches</div>
            </div>

            <div class="player-card">
                <div class="player-icon"><i class="fas fa-eye"></i></div>
                <div class="player-name">ORACLE</div>
                <div class="player-tag">T零丨Oracle</div>
            </div>

            <div class="player-card">
                <div class="player-icon"><i class="fas fa-fire"></i></div>
                <div class="player-name">HILLER</div>
                <div class="player-tag">T零丨Hiller</div>
            </div>

            <div class="player-card">
                <div class="player-icon"><i class="fas fa-star"></i></div>
                <div class="player-name">DIOR</div>
                <div class="player-tag">T零丨Dior</div>
            </div>

        </div>

        <footer>
            <p>© 2026 BLOOD ESPORTS | T零丨 DIVISION | ALL RIGHTS RESERVED</p>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('slime-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const drops = [];
        const dropCount = 70;

        class SlimeDrop {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 3 + 1;
                this.speedY = Math.random() * 2 + 0.5;
                this.alpha = Math.random() * 0.5 + 0.1;
                this.length = Math.random() * 25 + 10;
            }

            update() {
                this.y += this.speedY;
                if (this.y > canvas.height + this.length) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(57, 255, 20, ${this.alpha})`;
                ctx.lineWidth = this.radius;
                ctx.lineCap = 'round';
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();

                ctx.beginPath();
                ctx.fillStyle = `rgba(57, 255, 20, ${this.alpha + 0.1})`;
                ctx.arc(this.x, this.y + this.length, this.radius * 1.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < dropCount; i++) {
            drops.push(new SlimeDrop());
        }

        let glowPulses = [];

        function createGlowPulse() {
            glowPulses.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: 10,
                alpha: 0.35
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(3, 8, 3, 0.18)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() > 0.96) {
                createGlowPulse();
            }

            drops.forEach(drop => {
                drop.update();
                drop.draw();
            });

            glowPulses.forEach((pulse, index) => {
                ctx.beginPath();
                ctx.arc(pulse.x, pulse.y, pulse.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(57, 255, 20, ${pulse.alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();

                pulse.radius += 1.2;
                pulse.alpha -= 0.008;

                if (pulse.alpha <= 0) {
                    glowPulses.splice(index, 1);
                }
            });

            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
